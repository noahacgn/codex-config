# 第 1 节: 核心模型与运行策略
model = "gpt-5.5"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
personality = "pragmatic"
# model_provider = "custom"

# 推理能力相关
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
model_supports_reasoning_summaries = true
model_verbosity = "high"

# 杂项开关
suppress_unstable_features_warning = true
windows_wsl_setup_acknowledged = true
project_doc_fallback_filenames = ["CLAUDE.md"]

# 第 3 节: 分析、反馈与音频
[analytics]
enabled = false

# 第 6 节: 通知与迁移记录
[notice]
hide_rate_limit_model_nudge = true

# 第 7 节: Windows 沙箱
[windows]
sandbox = "unelevated"

# 第 12 节: TUI (终端界面) 配置
[tui]
alternate_screen = "never"
status_line = ["model-with-reasoning", "context-remaining", "context-used", "context-window-size", "five-hour-limit", "weekly-limit"]

# 第 14 节: 功能标志 (Feature Flags)
[features]
unified_exec = true
plugins = false
prevent_idle_sleep = true
apply_patch_freeform = true
default_mode_request_user_input = true
goals = true

# 第 15 节: Lifecycle Hooks
[[hooks.SessionStart]]
matcher = "startup|resume|clear"

[[hooks.SessionStart.hooks]]
type = "command"
command = "python ~/.codex/hooks/session_start.py"
timeout = 15
statusMessage = "Loading agent skills..."

# 第 17 节: Skills (技能) 配置
[skills.bundled]
enabled = false

# 第 20 节: 模型提供商定义
[model_providers.custom]
name = "OpenAI"
base_url = "https://ai.example.cn/v1"
requires_openai_auth = true

# 第 21 节: MCP 服务器配置
[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp?exaApiKey=your-exa-api-key-here"
enabled = true

[mcp_servers.chrome-devtools]
command = "npx"
args = ["chrome-devtools-mcp@latest"]
enabled = true
